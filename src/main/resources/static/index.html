<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <title>Tiwlink : Real-Time Chat Application</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <style>

        .chat-message{
        max-width:70%;
        padding:10px 15px;
        border-radius:15px;
        margin-bottom:10px;
        word-wrap:break-word;
        }

        .sent{
        background:#0d6efd;
        color:white;
        border-radius:15px;
        padding:6px 8px;
        align-self:flex-end;
        max-width:70%;
        margin-bottom:10px;
        }

        .received{
        background:#2b3035;
        color:white;
        border-radius:15px;
        padding:6px 8px;
        align-self:flex-start;
        max-width:70%;
        margin-bottom:10px;
        }

        .sender-name{
        font-size:10px;
        opacity:0.7;
        margin-bottom:3px;
        }


        #chat{
        background:#1e1f22;
        border-radius:10px;
        scroll-behavior:smooth;
        }


        #typingIndicator{
        height:20px;
        font-style:italic;
        opacity:0.7;
        margin-bottom:10px;
        }

    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.1/stomp.min.js"></script>
</head>
<body>
<div class="container mt-4">
    <h1 class="text-center">Tiwlink - Real-Time Chat Application</h1>
    <div id="chat"
         class="border rounded p-3 mb-3 d-flex flex-column"
         style="height:300px; overflow-y: auto;">
    </div>
    <div id="typingIndicator" class="text-muted small"></div>
    <div class="input-group mb-3">
        <input id="senderInput" type="text" class="form-control"
               placeholder="Your name...."/>
    </div>


    <div class="input-group mb-3">
        <input id="messageInput" type="text" class="form-control"
               placeholder="Type a message...."/>
        <div id="input-group-append">
            <button id="sendMessage" class="btn btn-primary">Send</button>
        </div>
    </div>
</div>
</body>
<script>

    let stompClient = null;

    function connect(){
    const socket = new WebSocket("/chat");
    );
    socket.onopen = () => {

    stompClient = Stomp.over(socket);
    stompClient.debug = null;

    stompClient.connect({}, frame => {

    console.log("CONNECTED");

    stompClient.subscribe("/topic/messages", message => {
    showMessage(JSON.parse(message.body));
    });

    stompClient.subscribe("/topic/typing", message => {

    const user = message.body;
    const currentUser = document.getElementById("senderInput").value;

    if(user !== currentUser){
    document.getElementById("typingIndicator").textContent =
    user + " is typing...";
    }

    setTimeout(()=>{
    document.getElementById("typingIndicator").textContent = "";
    },1000);

    });

    });

    };

    socket.onerror = err => console.error("WebSocket error", err);

    }

    function sendMessage(){

    if(!stompClient) return;

    const sender = document.getElementById("senderInput").value;
    const content = document.getElementById("messageInput").value;

    if(content.trim()==="") return;

    stompClient.send("/app/sendMessage",{},JSON.stringify({
    sender:sender,
    content:content
    }));

    document.getElementById("messageInput").value="";
    }

    function showMessage(message){

    const chat = document.getElementById("chat");
    const currentUser = document.getElementById("senderInput").value;

    const messageElement = document.createElement("div");
    messageElement.className =
    message.sender===currentUser
    ? "chat-message sent"
    : "chat-message received";

    messageElement.innerHTML =
    "<div class='sender-name'>"+message.sender+"</div>"+
    "<div>"+message.content+"</div>";

    chat.appendChild(messageElement);
    chat.scrollTop = chat.scrollHeight;

    }

    document.getElementById("messageInput").addEventListener("keypress",e=>{
    if(e.key==="Enter") sendMessage();
    });

    document.getElementById("sendMessage").onclick = sendMessage;

    window.onload = connect;

</script>
</html>
